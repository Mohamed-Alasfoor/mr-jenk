server:
  port: 8083
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:buy01-dev}

spring:
  application:
    name: media-service
  data:
    mongodb:
      uri: ${MEDIA_SERVICE_MONGODB_URI:mongodb://localhost:27017/media_service_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    secure-port-enabled: ${SERVER_SSL_ENABLED:false}
    non-secure-port-enabled: ${EUREKA_NON_SECURE_PORT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:changeit-changeit-changeit-changeit-changeit-1234567890}

app:
  services:
    product:
      base-url: ${PRODUCT_SERVICE_INTERNAL_BASE_URL:http://localhost:8082}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topics:
      media: ${KAFKA_MEDIA_TOPIC:media-events}
  media:
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:8080/media/images}
    max-file-size-bytes: 2097152
  storage:
    type: ${MEDIA_STORAGE_TYPE:s3}
    root-directory: ${MEDIA_STORAGE_ROOT:./storage/media}
    s3:
      endpoint: ${MEDIA_STORAGE_S3_ENDPOINT:http://localhost:9000}
      region: ${MEDIA_STORAGE_S3_REGION:us-east-1}
      access-key: ${MEDIA_STORAGE_S3_ACCESS_KEY:minioadmin}
      secret-key: ${MEDIA_STORAGE_S3_SECRET_KEY:minioadmin}
      bucket: ${MEDIA_STORAGE_S3_BUCKET:buy01-media}
