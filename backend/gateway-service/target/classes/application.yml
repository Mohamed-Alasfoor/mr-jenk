server:
  port: 8080
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:buy01-dev}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**,/me,/me/**,/sellers/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**
        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/media/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: ${EUREKA_REGISTRY_FETCH_INTERVAL_SECONDS:5}
  instance:
    secure-port-enabled: ${SERVER_SSL_ENABLED:false}
    non-secure-port-enabled: ${EUREKA_NON_SECURE_PORT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:changeit-changeit-changeit-changeit-changeit-1234567890}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    auth:
      max-requests: ${GATEWAY_RATE_LIMIT_AUTH_MAX_REQUESTS:30}
      window-seconds: ${GATEWAY_RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
    media-write:
      max-requests: ${GATEWAY_RATE_LIMIT_MEDIA_WRITE_MAX_REQUESTS:60}
      window-seconds: ${GATEWAY_RATE_LIMIT_MEDIA_WRITE_WINDOW_SECONDS:60}
