services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet mongodb://localhost:27017/admin --eval
          "quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  discovery-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: discovery-service
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8761/actuator/health | grep -q '"status":"UP"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: gateway-service
    restart: unless-stopped
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost,https://127.0.0.1,http://localhost:4200}
    depends_on:
      discovery-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: user-service
    restart: unless-stopped
    environment:
      USER_SERVICE_MONGODB_URI: mongodb://mongo:27017/user_service_db
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      MEDIA_SERVICE_INTERNAL_BASE_URL: http://media-service:8083
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://localhost/api/media/images}
    depends_on:
      mongo:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8081/actuator/health | grep -q '"status":"UP"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  product-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: product-service
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_MONGODB_URI: mongodb://mongo:27017/product_service_db
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      MEDIA_SERVICE_INTERNAL_BASE_URL: http://media-service:8083
    depends_on:
      mongo:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8082/actuator/health | grep -q '"status":"UP"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  media-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: media-service
    restart: unless-stopped
    environment:
      MEDIA_SERVICE_MONGODB_URI: mongodb://mongo:27017/media_service_db
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      PRODUCT_SERVICE_INTERNAL_BASE_URL: http://product-service:8082
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://localhost/api/media/images}
      MEDIA_STORAGE_S3_ENDPOINT: http://minio:9000
      MEDIA_STORAGE_S3_REGION: us-east-1
      MEDIA_STORAGE_S3_ACCESS_KEY: minioadmin
      MEDIA_STORAGE_S3_SECRET_KEY: minioadmin
      MEDIA_STORAGE_S3_BUCKET: buy01-media
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
      discovery-service:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8083/actuator/health | grep -q '"status":"UP"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENABLE_TLS: ${ENABLE_TLS:-true}
      ENABLE_LOCAL_TLS: ${ENABLE_LOCAL_TLS:-true}
      SERVER_NAME: ${SERVER_NAME:-localhost}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-31536000}
    depends_on:
      gateway-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - frontend-local-certs:/etc/nginx/local-certs
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost/healthz > /dev/null
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
  minio-data:
  frontend-local-certs:
