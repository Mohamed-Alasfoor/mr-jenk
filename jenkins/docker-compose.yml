services:
  jenkins:
    build: .
    container_name: jenkins
    restart: unless-stopped
    user: root # Running as root inside container to easily access host docker.sock, or adjust permissions
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

volumes:
  jenkins-data:
